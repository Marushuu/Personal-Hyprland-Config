$hypr = ~/.config/hypr
$hl = $hypr/hyprland
$mainMod = SUPER

# Variables
source = $hypr/variables.conf

# Monitor Data
monitorv2 {
    output = DP-3
    mode = 3440x1440@239.98Hz
    position = 0x0
    scale = 1
    bitdepth = 10
    vrr = 0
}

monitor = DP-4, 1920x1080@60.00Hz, auto-left, 1, transform, 1

# Configs
source = $hl/animations.conf
source = $hl/decorations.conf
source = $hl/colors.conf
source = $hl/env.conf
source = $hl/execs.conf
source = $hl/general.conf
source = $hl/input.conf
source = $hl/keybinds.conf
source = $hl/misc.conf
source = $hl/render.conf
source = $hl/rules.conf
source = $hl/plugins.conf