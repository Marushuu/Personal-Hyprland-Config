exec = hyprctl dispatch submap global
submap = global

## Shell Keybinds
bindi = $mainMod, Super_L, global
bindin = $mainMod, catchall, global,
bindin = $mainMod, mouse:272, global,
bindin = $mainMod, mouse:273, global,
bindin = $mainMod, mouse:274, global,
bindin = $mainMod, mouse:275, global,
bindin = $mainMod, mouse:276, global,
bindin = $mainMod, mouse:277, global,
bindin = $mainMod, mouse_up, global,
bindin = $mainMod, mouse_down, global,

## Session
bind = $mainMod, L, exec, loginctl lock-session
bindl = $mainMod+Shift, L, exec, systemctl suspend
bind = $mainMod+Ctrl+Shift+Alt, Delete, exec, systemctl poweroff

## Apps
bind = $mainMod, Grave, exec, $terminal
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileExplorer
bind = $mainMod, SPACE, exec, $appLauncher
bind = $mainMod, W, exec, $browser
bind = $mainMod, C, exec, $editor

## Media
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl= , XF86AudioPlay, exec, playerctl -a play-pause
bindl= , XF86AudioPause, exec, playerctl -a play-pause

# Clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshot
bind = $mainMod+Shift, S, exec, grimblast copysave area
bind = $mainMod+Ctrl+Shift, S, exec, grimblast copysave screen

# Brightness
bindle = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

## Windows
# Mouse Bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:274, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move Focus
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r
bind = $mainMod, mouse_up, movefocus, l
bind = $mainMod, mouse_down, movefocus, r
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Down, movefocus, d

# Interactions
bind = $mainMod, Q, killactive
bind = Alt, F4, killactive
bind = $mainMod+Alt, Space, togglefloating
bind = $mainMod+Ctrl, F, fullscreen, 1
bind = $mainMod, F, fullscreen, 0
bind = $mainMod+Alt, F, fullscreen, 0 3
bind = $mainMod, P, pin

# Resizing
# binde = $mainMod, Semicolon, splitratio -0.1
# binde = $mainMod, Apostrophe, splitratio +0.1

# Special Workspace
bind = $mainMod, S, togglespecialworkspace, music
# bind = Ctrl+Shift, Escape, togglespecialworkspace, btop

## Workspaces - Contains Split Plugin
# Window Movement
bind = $mainMod+Shift, Left, movewindow, left
bind = $mainMod+Shift, Right, movewindow, right
bind = $mainMod+Shift, Up, movewindow, up
bind = $mainMod+Shift, Down, movewindow, down

bind = $mainMod+Alt, Right, split-movetoworkspace, r+1
bind = $mainMod+Alt, Left, split-movetoworkspace, r-1
bind = $mainMod+Alt, mouse_down, split-movetoworkspace, r-1
bind = $mainMod+Alt, mouse_up, split-movetoworkspace, r+1

bind = $mainMod+Shift, 1, split-movetoworkspacesilent, 1
bind = $mainMod+Shift, 2, split-movetoworkspacesilent, 2
bind = $mainMod+Shift, 3, split-movetoworkspacesilent, 3
bind = $mainMod+Shift, 4, split-movetoworkspacesilent, 4
bind = $mainMod+Shift, 5, split-movetoworkspacesilent, 5
bind = $mainMod+Shift, 6, split-movetoworkspacesilent, 6
bind = $mainMod+Shift, 7, split-movetoworkspacesilent, 7
bind = $mainMod+Shift, 8, split-movetoworkspacesilent, 8
bind = $mainMod+Shift, 9, split-movetoworkspacesilent, 9

bind = $mainMod+Alt+Shift, Right, split-changemonitor, -1
bind = $mainMod+Alt+Shift, Left, split-changemonitor, +1
bind = $mainMod+Alt+Shift, mouse_down, split-changemonitor, +1
bind = $mainMod+Alt+Shift, mouse_up, split-changemonitor, -1

# Workspace Switching
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9

bind = $mainMod+Ctrl, Right, split-workspace, r+1
bind = $mainMod+Ctrl, Left, split-workspace, r-1
bind = $mainMod+Ctrl, mouse_up, split-workspace, r+1
bind = $mainMod+Ctrl, mouse_down, split-workspace, r-1

# Hyprsplit Specials
bind = $mainMod, G, split-grabroguewindows

# Sub-Map for Resizing
bind = $mainMod, R, submap, resize
submap = resize
binde = , left, resizeactive, -10 0
binde = , right, resizeactive, 10 0
binde = , up, resizeactive, 0 10
binde = , down, resizeactive, 0 -10
bind = , escape, submap, global

