animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
	path = screenshot
	color = rgba(0, 0, 0, 1.0)
	blur_passes = 2
}

input-field {
    monitor = DP-3
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.1
    dots_spacing = 0.3
    outer_color = rgba(235, 235, 235, 1.0)
    inner_color = rgba(17, 17, 17, 1.0)
    font_color = rgba(235, 235, 235, 1.0)
    fade_on_empty = true

    position = 0, 20
    halign = center
    valign = center
}

label { # Clock
    monitor = DP-3
    text = $TIME
    color = rgba(235, 235, 235, 1.0)
    font_size = 65

    position = 0, 300
    halign = center
    valign = center
}

label { # Date
    monitor = DP-3
    text = cmd[update:5000] date +"%A, %B %d"
    color = rgba(235, 235, 235, 1.0)
    font_size = 17

    position = 0, 240
    halign = center
    valign = center
}

label { # User
    monitor = DP-3
    text = Hello, Marushu
    color = $text_color
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 20
    position = 0, 50
    halign = center
    valign = bottom
}
